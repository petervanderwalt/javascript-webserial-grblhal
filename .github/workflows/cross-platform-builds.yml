name: Cross-Platform Builds

on:
  push:
    branches: [ "master", "main" ]
    tags-ignore:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.version }}
      changelog: ${{ steps.changelog.outputs.msg }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Bump Version
        id: bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ $(git log -1 --pretty=%B) != *"Bump to "* ]]; then
            npm version patch -m "Bump to %s [skip ci]"
            git push origin HEAD --tags
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
      - name: Changelog
        id: changelog
        run: |
          MSG=$(git log -1 --pretty=format:'%s')
          if [[ "$MSG" == *"Bump to "* ]]; then
            MSG=$(git log -2 --pretty=format:'%s' | tail -n 1)
          fi
          echo "msg<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT


  build-android:
    name: Build Android APK
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_version }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova & dependencies
        run: |
          npm install -g cordova
          npm install
          
      - name: Build Android
        run: |
          npm run cordova-sync
          cd cordova
          npx cordova-res android --skip-config
          cordova platform add android
          cordova build android
          VERSION=$(node -p "require('./package.json').version")
          mv cordova/platforms/android/app/build/outputs/apk/debug/app-debug.apk cordova/platforms/android/app/build/outputs/apk/debug/javascript-webserial-grblhal-${VERSION}-Android.apk || true
          
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: Ooznest-Android-APK
          path: cordova/platforms/android/app/build/outputs/apk/debug/*.apk

  build-ios:
    name: Build iOS App
    needs: bump-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_version }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Cordova & dependencies
        run: |
          npm install -g cordova
          npm install
          
      - name: Build iOS Payload
        run: |
          npm run cordova-sync
          cd cordova
          npx cordova-res ios --skip-config || true
          cordova platform add ios
          cd platforms/ios
          xcodebuild build -workspace App.xcworkspace -scheme App -configuration Debug -destination generic/platform=iOS -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""
          cd ../..
          
          # Package .app into .ipa for sideloading
          mkdir -p Payload
          cp -r platforms/ios/build/Build/Products/Debug-iphoneos/*.app Payload/
          VERSION=$(node -p "require('../../package.json').version")
          zip -r javascript-webserial-grblhal-${VERSION}-iOS.ipa Payload/
          
      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: Ooznest-iOS-IPA
          path: cordova/*.ipa

  build-windows:
    name: Build Windows App
    needs: bump-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_version }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Windows Executable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build-windows
        
      - name: Upload Windows Exe
        uses: actions/upload-artifact@v4
        with:
          name: Ooznest-Windows-App
          path: dist/*.exe

  build-macos:
    name: Build macOS App
    needs: bump-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_version }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build macOS Application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build-macos
        
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ooznest-macOS-App
          path: dist/*.dmg

  build-linux:
    name: Build Linux App
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_version }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build Linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build-linux
        
      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Ooznest-Linux-App
          path: dist/*.AppImage

  build-sd:
    name: Build SD Card Payload
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_version }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Build SD Card Payload
        run: npm run build-sd
        
      - name: Upload SD Card Payload
        uses: actions/upload-artifact@v4
        with:
          name: Ooznest-SD-WebUI
          path: |
            dist/index.html.gz
            dist/*.stl

  create-release:
    name: Create Release
    needs: bump-version
    needs: [bump-version, build-android, build-ios, build-windows, build-macos, build-linux, build-sd]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: output-artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_version }}
          name: Release ${{ needs.bump-version.outputs.new_version }}
          body: ${{ needs.bump-version.outputs.changelog }}
          files: |
            output-artifacts/**/*.apk
            output-artifacts/**/*.ipa
            output-artifacts/**/*.exe
            output-artifacts/**/*.dmg
            output-artifacts/**/*.AppImage
            output-artifacts/**/*.gz
            output-artifacts/**/*.stl
